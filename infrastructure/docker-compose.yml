version: '3.3'

services:
  evolution_api:
    container_name: evolution_api
    image: attdevelopers/evolution-api:v2.1.1 # Check for latest version
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=mudar_essa_senha_global
      
      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_pass@postgres:5432/evolution
      - DATABASE_CLIENT_NAME=evolution_exchange
      
      # Redis (Required for v2)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      
      # Webhooks (CRITICAL FOR CRM)
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=https://ahvaqriovmsxixgilkxa.supabase.co/functions/v1/webhook-whatsapp
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_SET=true
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=true
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=true
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=true
      - WEBHOOK_EVENTS_CHATS_UPSERT=true
      - WEBHOOK_EVENTS_CHATS_UPDATE=true

      # Local Media Storage (Enable this if S3 is disabled)
      - SERVER_URL=https://stenio-evolution.vfgbmr.easypanel.host

      # S3 / Minio (Optional - set true if you want media)
      - S3_ENABLED=false
      # - S3_ACCESS_KEY=...
      # - S3_SECRET_KEY=...
      # - S3_BUCKET=chat-media
      # - S3_PORT=443
      # - S3_ENDPOINT=https://ahvaqriovmsxixgilkxa.storage.supabase.co/storage/v1/s3
      # - S3_USE_SSL=true
      # - S3_REGION=sa-east-1

    depends_on:
      - postgres
      - redis
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances

  postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_pass
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data

  redis:
    container_name: evolution_redis
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data

volumes:
  evolution_pg_data:
  evolution_redis_data:
  evolution_store:
  evolution_instances:
